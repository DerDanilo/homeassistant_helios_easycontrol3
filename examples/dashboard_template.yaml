# =========================================================================
# Helios easyControls 3.0 — Lovelace Dashboard Template
# =========================================================================
# Drop this into a new dashboard view (Settings -> Dashboards -> + Add).
#
# Required HACS frontend cards:
#   - mushroom            (https://github.com/piitaya/lovelace-mushroom)
#   - card-mod            (https://github.com/thomasloven/lovelace-card-mod)
#   - apexcharts-card     (https://github.com/RomRider/apexcharts-card)
#
# Optional helper used in the "Automationsschutz" section:
#   - input_boolean.kwl_automationen_gesperrt
#     Settings -> Devices & Services -> Helpers -> + Add Helper -> Toggle.
#     Use this in your own automations as a condition guard
#     (`condition: state, entity_id: input_boolean.kwl_automationen_gesperrt,
#      state: 'off'`) so you can disable all KWL automations with one tap.
#
# ENTITY-ID NAMING:
# This template references the German entity-id slugs that HA generates
# when the integration runs in a German locale, e.g.
# `fan.helios_kwl_250_w_luftungsgerat`. If your HA UI language is English
# the slugs will look like `fan.helios_kwl_250_w_ventilation_unit` etc.
# Do a global find-replace if needed, or change the HA UI language to
# German once to let HA generate the slugs, then switch back.
#
# DEVICE-NAME NAMING:
# If your KWL is a different model than KWL 250 W (e.g. KWL 300 W ET),
# replace `helios_kwl_250_w` with your device's actual slug everywhere.
# =========================================================================

views:
  - title: KWL
    path: kwl
    icon: mdi:fan
    type: sidebar
    theme: UI Lovelace Minimalist Dark
    badges: []
    cards:
      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Helios KWL 250 W
            subtitle: Lüftung · Klima · Steuerung · Wartung
          - type: custom:mushroom-chips-card
            alignment: center
            chips:
              - type: entity
                entity: fan.helios_kwl_250_w_luftungsgerat
                icon: mdi:air-purifier
                content_info: state
              - type: entity
                entity: sensor.helios_kwl_250_w_aktuelle_lufterleistung
                icon: mdi:fan
                content_info: state
              - type: entity
                entity: sensor.helios_kwl_250_w_co2
                icon: mdi:molecule-co2
                content_info: state
              - type: entity
                entity: sensor.helios_kwl_250_w_relative_luftfeuchte
                icon: mdi:water-percent
                content_info: state
              - type: entity
                entity: sensor.helios_kwl_250_w_lufttemperatur_abluft
                icon: mdi:home-thermometer
                content_info: state
            card_mod:
              style: |
                ha-card {
                  border-radius: 24px;
                  padding: 8px 10px;
                  background: rgba(20, 20, 20, 0.35);
                  backdrop-filter: blur(12px);
                }

      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Betriebsmodus
            subtitle: Schnellwahl der Lüftungsstufe
          - type: grid
            columns: 4
            square: false
            cards:
              - type: custom:mushroom-template-card
                entity: fan.helios_kwl_250_w_luftungsgerat
                primary: Zuhause
                secondary: >-
                  {% if state_attr('fan.helios_kwl_250_w_luftungsgerat',
                  'preset_mode') == 'Home' %}
                    Aktiv
                  {% else %}
                    Umschalten
                  {% endif %}
                icon: mdi:home
                tap_action:
                  action: perform-action
                  target:
                    entity_id: fan.helios_kwl_250_w_luftungsgerat
                  data:
                    preset_mode: Home
                  perform_action: fan.set_preset_mode
                color: >-
                  {% if state_attr('fan.helios_kwl_250_w_luftungsgerat',
                  'preset_mode') == 'Home' %}
                    green
                  {% else %}
                    disabled
                  {% endif %}
                vertical: true
                features_position: bottom
                card_mod:
                  style: |
                    ha-card {
                      min-height: 110px;
                      border-radius: 26px;
                      {% if state_attr('fan.helios_kwl_250_w_luftungsgerat', 'preset_mode') == 'Home' %}
                      background: linear-gradient(135deg, rgba(76, 175, 80, 0.28), rgba(76, 175, 80, 0.08));
                      border: 1px solid rgba(76, 175, 80, 0.55);
                      {% else %}
                      background: rgba(20, 20, 20, 0.35);
                      border: 1px solid rgba(255, 255, 255, 0.08);
                      {% endif %}
                    }
              - type: custom:mushroom-template-card
                entity: fan.helios_kwl_250_w_luftungsgerat
                primary: Unterwegs
                secondary: >-
                  {% if state_attr('fan.helios_kwl_250_w_luftungsgerat',
                  'preset_mode') == 'Away' %}
                    Aktiv
                  {% else %}
                    Umschalten
                  {% endif %}
                icon: mdi:airplane
                tap_action:
                  action: perform-action
                  target:
                    entity_id: fan.helios_kwl_250_w_luftungsgerat
                  data:
                    preset_mode: Away
                  perform_action: fan.set_preset_mode
                color: >-
                  {% if state_attr('fan.helios_kwl_250_w_luftungsgerat',
                  'preset_mode') == 'Away' %}
                    red
                  {% else %}
                    disabled
                  {% endif %}
                vertical: true
                features_position: bottom
                card_mod:
                  style: |
                    ha-card {
                      min-height: 110px;
                      border-radius: 26px;
                      {% if state_attr('fan.helios_kwl_250_w_luftungsgerat', 'preset_mode') == 'Away' %}
                      background: linear-gradient(135deg, rgba(244, 67, 54, 0.28), rgba(244, 67, 54, 0.08));
                      border: 1px solid rgba(244, 67, 54, 0.55);
                      {% else %}
                      background: rgba(20, 20, 20, 0.35);
                      border: 1px solid rgba(255, 255, 255, 0.08);
                      {% endif %}
                    }
              - type: custom:mushroom-template-card
                entity: fan.helios_kwl_250_w_luftungsgerat
                primary: Intensiv
                secondary: >-
                  {% if state_attr('fan.helios_kwl_250_w_luftungsgerat',
                  'preset_mode') == 'Boost' %}
                    Aktiv · noch {{ states('sensor.helios_kwl_250_w_intensiv_verbleibend') }}
                  {% else %}
                    Stoßlüftung
                  {% endif %}
                icon: mdi:fan
                tap_action:
                  action: perform-action
                  target:
                    entity_id: fan.helios_kwl_250_w_luftungsgerat
                  data:
                    preset_mode: Boost
                  perform_action: fan.set_preset_mode
                color: >-
                  {% if state_attr('fan.helios_kwl_250_w_luftungsgerat',
                  'preset_mode') == 'Boost' %}
                    blue
                  {% else %}
                    disabled
                  {% endif %}
                vertical: true
                features_position: bottom
                card_mod:
                  style: |
                    ha-card {
                      min-height: 110px;
                      border-radius: 26px;
                      {% if state_attr('fan.helios_kwl_250_w_luftungsgerat', 'preset_mode') == 'Boost' %}
                      background: linear-gradient(135deg, rgba(33, 150, 243, 0.30), rgba(33, 150, 243, 0.08));
                      border: 1px solid rgba(33, 150, 243, 0.55);
                      {% else %}
                      background: rgba(20, 20, 20, 0.35);
                      border: 1px solid rgba(255, 255, 255, 0.08);
                      {% endif %}
                    }
              - type: custom:mushroom-template-card
                entity: fan.helios_kwl_250_w_luftungsgerat
                primary: Individuell
                secondary: >-
                  {% if state_attr('fan.helios_kwl_250_w_luftungsgerat',
                  'preset_mode') == 'Individual' %}
                    Aktiv · noch {{ states('sensor.helios_kwl_250_w_individuell_verbleibend') }}
                  {% else %}
                    Manuell
                  {% endif %}
                icon: mdi:tune
                tap_action:
                  action: perform-action
                  target:
                    entity_id: fan.helios_kwl_250_w_luftungsgerat
                  data:
                    preset_mode: Individual
                  perform_action: fan.set_preset_mode
                color: >-
                  {% if state_attr('fan.helios_kwl_250_w_luftungsgerat',
                  'preset_mode') == 'Individual' %}
                    orange
                  {% else %}
                    disabled
                  {% endif %}
                vertical: true
                features_position: bottom
                card_mod:
                  style: |
                    ha-card {
                      min-height: 110px;
                      border-radius: 26px;
                      {% if state_attr('fan.helios_kwl_250_w_luftungsgerat', 'preset_mode') == 'Individual' %}
                      background: linear-gradient(135deg, rgba(255, 152, 0, 0.30), rgba(255, 152, 0, 0.08));
                      border: 1px solid rgba(255, 152, 0, 0.55);
                      {% else %}
                      background: rgba(20, 20, 20, 0.35);
                      border: 1px solid rgba(255, 255, 255, 0.08);
                      {% endif %}
                    }

      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Live-Werte
            subtitle: Aktuelle Sensorwerte der KWL
          - type: grid
            columns: 2
            square: false
            cards:
              - type: custom:mushroom-template-card
                entity: sensor.helios_kwl_250_w_lufttemperatur_abluft
                primary: Abluft (Innen)
                secondary: >-
                  {{ states('sensor.helios_kwl_250_w_lufttemperatur_abluft') }}
                  °C
                icon: mdi:home-thermometer
                icon_color: orange
                tap_action:
                  action: more-info
                card_mod:
                  style: >
                    ha-card { border-radius: 24px; background: rgba(20, 20, 20,
                    0.35); }
              - type: custom:mushroom-template-card
                entity: sensor.helios_kwl_250_w_lufttemperatur_aussenluft
                primary: Außenluft
                secondary: >-
                  {{ states('sensor.helios_kwl_250_w_lufttemperatur_aussenluft')
                  }} °C
                icon: mdi:thermometer-lines
                icon_color: teal
                tap_action:
                  action: more-info
                card_mod:
                  style: >
                    ha-card { border-radius: 24px; background: rgba(20, 20, 20,
                    0.35); }
              - type: custom:mushroom-template-card
                entity: sensor.helios_kwl_250_w_lufttemperatur_zuluft
                primary: Zuluft
                secondary: >-
                  {{ states('sensor.helios_kwl_250_w_lufttemperatur_zuluft') }}
                  °C
                icon: mdi:arrow-down-bold
                icon_color: green
                tap_action:
                  action: more-info
                card_mod:
                  style: >
                    ha-card { border-radius: 24px; background: rgba(20, 20, 20,
                    0.35); }
              - type: custom:mushroom-template-card
                entity: sensor.helios_kwl_250_w_lufttemperatur_fortluft
                primary: Fortluft (Abluft außen)
                secondary: >-
                  {{ states('sensor.helios_kwl_250_w_lufttemperatur_fortluft')
                  }} °C
                icon: mdi:arrow-up-bold
                icon_color: purple
                tap_action:
                  action: more-info
                card_mod:
                  style: >
                    ha-card { border-radius: 24px; background: rgba(20, 20, 20,
                    0.35); }
              - type: custom:mushroom-template-card
                entity: sensor.helios_kwl_250_w_relative_luftfeuchte
                primary: Luftfeuchte
                secondary: '{{ states(''sensor.helios_kwl_250_w_relative_luftfeuchte'') }} %'
                icon: mdi:water-percent
                icon_color: blue
                tap_action:
                  action: more-info
                card_mod:
                  style: >
                    ha-card { border-radius: 24px; background: rgba(20, 20, 20,
                    0.35); }
              - type: custom:mushroom-template-card
                entity: sensor.helios_kwl_250_w_co2
                primary: CO₂
                secondary: |-
                  {{ states('sensor.helios_kwl_250_w_co2') }} ppm
                  {% set co2 = states('sensor.helios_kwl_250_w_co2') | int(0) %}
                  {% if co2 < 800 %} · Gut
                  {% elif co2 < 1200 %} · Mittel
                  {% else %} · Hoch
                  {% endif %}
                icon: mdi:molecule-co2
                icon_color: |-
                  {% set co2 = states('sensor.helios_kwl_250_w_co2') | int(0) %}
                  {% if co2 < 800 %}green
                  {% elif co2 < 1200 %}amber
                  {% else %}red{% endif %}
                tap_action:
                  action: more-info
                card_mod:
                  style: >
                    ha-card { border-radius: 24px; background: rgba(20, 20, 20,
                    0.35); }
              - type: custom:mushroom-template-card
                entity: sensor.helios_kwl_250_w_aktuelle_lufterleistung
                primary: Lüfterleistung (Stufe)
                secondary: >-
                  {{ states('sensor.helios_kwl_250_w_aktuelle_lufterleistung')
                  }}
                icon: mdi:fan-speed-3
                icon_color: cyan
                tap_action:
                  action: more-info
                card_mod:
                  style: >
                    ha-card { border-radius: 24px; background: rgba(20, 20, 20,
                    0.35); }
              - type: custom:mushroom-template-card
                entity: sensor.helios_kwl_250_w_lufterdrehzahl_zuluft
                primary: Drehzahl Zuluft
                secondary: >-
                  {{ states('sensor.helios_kwl_250_w_lufterdrehzahl_zuluft') }}
                  U/min
                icon: mdi:rotate-right
                icon_color: light-green
                tap_action:
                  action: more-info
                card_mod:
                  style: >
                    ha-card { border-radius: 24px; background: rgba(20, 20, 20,
                    0.35); }
              - type: custom:mushroom-template-card
                entity: sensor.helios_kwl_250_w_lufterdrehzahl_abluft
                primary: Drehzahl Abluft
                secondary: >-
                  {{ states('sensor.helios_kwl_250_w_lufterdrehzahl_abluft') }}
                  U/min
                icon: mdi:rotate-left
                icon_color: deep-purple
                tap_action:
                  action: more-info
                card_mod:
                  style: >
                    ha-card { border-radius: 24px; background: rgba(20, 20, 20,
                    0.35); }
              - type: custom:mushroom-template-card
                entity: binary_sensor.helios_kwl_250_w_bypass_stufenlos_aktiv
                primary: Bypass
                secondary: >-
                  {% if
                  is_state('binary_sensor.helios_kwl_250_w_bypass_stufenlos_aktiv',
                  'on') %}
                    Aktiv – Freikühlbetrieb
                  {% else %}
                    Inaktiv – Wärmetauscher aktiv
                  {% endif %}
                icon: >-
                  {% if
                  is_state('binary_sensor.helios_kwl_250_w_bypass_stufenlos_aktiv',
                  'on') %}
                    mdi:valve-open
                  {% else %}
                    mdi:valve-closed
                  {% endif %}
                icon_color: >-
                  {% if
                  is_state('binary_sensor.helios_kwl_250_w_bypass_stufenlos_aktiv',
                  'on') %}
                    cyan
                  {% else %}
                    grey
                  {% endif %}
                tap_action:
                  action: more-info
                card_mod:
                  style: >
                    ha-card { border-radius: 24px; background: rgba(20, 20, 20,
                    0.35); }
              - type: custom:mushroom-template-card
                entity: sensor.helios_kwl_250_w_warmetauscher_status
                primary: Wärmetauscher
                secondary: '{{ states(''sensor.helios_kwl_250_w_warmetauscher_status'') }}'
                icon: mdi:heat-wave
                icon_color: deep-orange
                tap_action:
                  action: more-info
                card_mod:
                  style: >
                    ha-card { border-radius: 24px; background: rgba(20, 20, 20,
                    0.35); }

      - type: vertical-stack
        cards:
          - type: custom:mushroom-title-card
            title: Sondermodi
            subtitle: Automatische & geplante Betriebsarten
          - type: grid
            columns: 3
            square: false
            cards:
              - type: custom:mushroom-template-card
                entity: binary_sensor.helios_kwl_250_w_modus_abtauung_aktiv
                primary: Abtauung
                secondary: >-
                  {% if
                  is_state('binary_sensor.helios_kwl_250_w_modus_abtauung_aktiv',
                  'on') %}
                    Aktiv
                  {% else %}
                    Inaktiv
                  {% endif %}
                icon: mdi:snowflake-melt
                icon_color: >-
                  {% if
                  is_state('binary_sensor.helios_kwl_250_w_modus_abtauung_aktiv',
                  'on') %}
                    blue
                  {% else %}
                    grey
                  {% endif %}
                layout: vertical
                fill_container: true
                tap_action:
                  action: more-info
                card_mod:
                  style: |
                    ha-card {
                      min-height: 90px;
                      border-radius: 24px;
                      background: rgba(20, 20, 20, 0.35);
                    }
              - type: custom:mushroom-template-card
                entity: switch.helios_kwl_250_w_wochenprogramm_aktiv
                primary: Wochenprogramm
                secondary: >-
                  {% if is_state('switch.helios_kwl_250_w_wochenprogramm_aktiv',
                  'on') %}
                    Aktiv
                  {% else %}
                    Inaktiv
                  {% endif %}
                icon: mdi:calendar-week
                icon_color: >-
                  {% if is_state('switch.helios_kwl_250_w_wochenprogramm_aktiv',
                  'on') %}
                    indigo
                  {% else %}
                    grey
                  {% endif %}
                layout: vertical
                fill_container: true
                tap_action:
                  action: toggle
                card_mod:
                  style: |
                    ha-card {
                      min-height: 90px;
                      border-radius: 24px;
                      background: rgba(20, 20, 20, 0.35);
                    }
              - type: custom:mushroom-template-card
                entity: switch.helios_kwl_250_w_urlaubsmodus_aktiv
                primary: Urlaubsmodus
                secondary: >-
                  {% if is_state('switch.helios_kwl_250_w_urlaubsmodus_aktiv',
                  'on') %}
                    Aktiv
                  {% else %}
                    Inaktiv
                  {% endif %}
                icon: mdi:beach
                icon_color: >-
                  {% if is_state('switch.helios_kwl_250_w_urlaubsmodus_aktiv',
                  'on') %}
                    amber
                  {% else %}
                    grey
                  {% endif %}
                layout: vertical
                fill_container: true
                tap_action:
                  action: toggle
                card_mod:
                  style: |
                    ha-card {
                      min-height: 90px;
                      border-radius: 24px;
                      background: rgba(20, 20, 20, 0.35);
                    }

      - type: custom:apexcharts-card
        graph_span: 24h
        update_interval: 1min
        header:
          show: true
          title: Klima 24 Stunden
          show_states: true
          colorize_states: true
        apex_config:
          chart:
            height: 330
            toolbar:
              show: false
          stroke:
            curve: smooth
            width: 3
          legend:
            show: true
            position: bottom
          grid:
            borderColor: rgba(255,255,255,0.08)
          tooltip:
            shared: true
            followCursor: true
        yaxis:
          - id: temp
            decimals: 1
            apex_config:
              title:
                text: Temperatur °C
          - id: humidity
            opposite: true
            min: 0
            max: 100
            decimals: 0
            apex_config:
              title:
                text: Feuchte %
        series:
          - entity: sensor.helios_kwl_250_w_lufttemperatur_abluft
            name: Abluft (Innen)
            yaxis_id: temp
            show:
              in_header: true
            group_by:
              func: avg
              duration: 10min
          - entity: sensor.helios_kwl_250_w_lufttemperatur_aussenluft
            name: Außen
            yaxis_id: temp
            show:
              in_header: true
            group_by:
              func: avg
              duration: 10min
          - entity: sensor.helios_kwl_250_w_lufttemperatur_zuluft
            name: Zuluft
            yaxis_id: temp
            show:
              in_header: false
            group_by:
              func: avg
              duration: 10min
          - entity: sensor.helios_kwl_250_w_lufttemperatur_fortluft
            name: Fortluft
            yaxis_id: temp
            show:
              in_header: false
            group_by:
              func: avg
              duration: 10min
          - entity: sensor.helios_kwl_250_w_relative_luftfeuchte
            name: Feuchte
            yaxis_id: humidity
            show:
              in_header: true
            group_by:
              func: avg
              duration: 10min
        card_mod:
          style: |
            ha-card {
              border-radius: 26px;
              background: rgba(20, 20, 20, 0.35);
              backdrop-filter: blur(12px);
            }

      - type: custom:apexcharts-card
        graph_span: 24h
        update_interval: 1min
        header:
          show: true
          title: CO₂ 24 Stunden
          show_states: true
          colorize_states: true
        apex_config:
          chart:
            height: 220
            toolbar:
              show: false
          stroke:
            curve: smooth
            width: 3
          legend:
            show: false
          grid:
            borderColor: rgba(255,255,255,0.08)
          tooltip:
            shared: true
            followCursor: true
          annotations:
            yaxis:
              - 'y': 1000
                borderColor: rgba(255, 152, 0, 0.7)
                label:
                  text: Grenzwert 1000 ppm
                  style:
                    color: rgba(255, 152, 0, 0.9)
        yaxis:
          - id: co2
            min: 300
            decimals: 0
            apex_config:
              title:
                text: CO₂ ppm
        series:
          - entity: sensor.helios_kwl_250_w_co2
            name: CO₂
            yaxis_id: co2
            color: rgba(100, 220, 100, 0.9)
            show:
              in_header: true
            group_by:
              func: avg
              duration: 10min
        card_mod:
          style: |
            ha-card {
              border-radius: 26px;
              background: rgba(20, 20, 20, 0.35);
              backdrop-filter: blur(12px);
            }

      - type: custom:apexcharts-card
        graph_span: 24h
        update_interval: 1min
        header:
          show: true
          title: Lüfter 24 Stunden
          show_states: true
          colorize_states: true
        apex_config:
          chart:
            height: 260
            toolbar:
              show: false
          stroke:
            curve: stepline
            width: 3
          legend:
            show: true
            position: bottom
          grid:
            borderColor: rgba(255,255,255,0.08)
          tooltip:
            shared: true
            followCursor: true
        yaxis:
          - id: speed
            decimals: 0
            apex_config:
              title:
                text: Lüfterstufe
          - id: rpm
            opposite: true
            decimals: 0
            apex_config:
              title:
                text: U/min
        series:
          - entity: sensor.helios_kwl_250_w_aktuelle_lufterleistung
            name: Lüfterstufe
            yaxis_id: speed
            show:
              in_header: true
            group_by:
              func: last
              duration: 5min
          - entity: sensor.helios_kwl_250_w_lufterdrehzahl_zuluft
            name: Drehzahl Zuluft
            yaxis_id: rpm
            show:
              in_header: false
            group_by:
              func: avg
              duration: 5min
          - entity: sensor.helios_kwl_250_w_lufterdrehzahl_abluft
            name: Drehzahl Abluft
            yaxis_id: rpm
            show:
              in_header: false
            group_by:
              func: avg
              duration: 5min
        card_mod:
          style: |
            ha-card {
              border-radius: 26px;
              background: rgba(20, 20, 20, 0.35);
              backdrop-filter: blur(12px);
            }

      - type: custom:apexcharts-card
        graph_span: 4h
        update_interval: 30sec
        header:
          show: true
          title: Restlaufzeit Boost & Individuell
          show_states: true
          colorize_states: true
        apex_config:
          chart:
            height: 200
            toolbar:
              show: false
          stroke:
            curve: stepline
            width: 3
          legend:
            show: true
            position: bottom
          grid:
